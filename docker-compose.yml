version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cognentrz_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cognentrz_db
      POSTGRES_USER: cognentrz_user
      POSTGRES_PASSWORD: cognentrz_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognentrz_user -d cognentrz_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
